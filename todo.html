<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="todo-style.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <header>
                <h1>My To-Do List</h1>
                <p class="subtitle">Stay organized and productive</p>
            </header>

            <div class="input-section">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="todoInput" 
                        placeholder="Add a new task..." 
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn">Add</button>
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
            </div>

            <div class="stats">
                <span id="totalTasks">0 tasks</span>
                <span id="completedTasks">0 completed</span>
            </div>

            <ul id="todoList" class="todo-list">
                <!-- Tasks will be added here dynamically -->
            </ul>

            <div class="empty-state" id="emptyState">
                <p>No tasks yet. Add one to get started! 🚀</p>
            </div>

            <div class="actions">
                <button id="clearBtn" class="clear-btn">Clear Completed</button>
                <button id="deleteAllBtn" class="delete-all-btn">Delete All</button>
            </div>
        </div>
    </div>

    <script src="todo-script.js"></script>
</body>
</html>
